# E-Business Card API on existing subdomain + port 8001 (no new DNS record).
# CMS:  https://focms.megaannum.ai      (443) → 127.0.0.1:8000
# EBC:  https://focms.megaannum.ai:8001 (8001) → 127.0.0.1:8002 (Docker)
#
# Prerequisite: SSL cert for focms.megaannum.ai already exists (CMS certbot).
#   sudo certbot --nginx -d focms.megaannum.ai   # if not done yet
#
# Alibaba firewall: open TCP 8001
#
#   sudo cp deploy/nginx/focms-ebc-8001.conf /etc/nginx/sites-available/ebc-api
#   sudo ln -sf /etc/nginx/sites-available/ebc-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Test: https://focms.megaannum.ai:8001/docs

server {
    listen 8001 ssl;
    listen [::]:8001 ssl;
    server_name focms.megaannum.ai;

    ssl_certificate /etc/letsencrypt/live/focms.megaannum.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/focms.megaannum.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
