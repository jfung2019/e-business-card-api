# Production stack for a Linux VPS (Alibaba Simple Application Server).
# MongoDB is NOT exposed to the internet.
# Docker API on 127.0.0.1:8002 (CMS uses :8000; nginx SSL on :8001 proxies here).
# Paths are relative to repo root — use: bash deploy/start.sh

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ebc-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8000"
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017
      MONGO_DB_NAME: ${MONGO_DB_NAME:-e_business_card}
      MONGO_CARDS_COLLECTION: ${MONGO_CARDS_COLLECTION:-captured_cards}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-chat}
      OPENROUTER_TIMEOUT_SECONDS: ${OPENROUTER_TIMEOUT_SECONDS:-30}
      OPENROUTER_MAX_RETRIES: ${OPENROUTER_MAX_RETRIES:-2}
      FIREBASE_CREDENTIALS_PATH: /app/firebase-service-account.json
      SHARE_PUBLIC_BASE_URL: ${SHARE_PUBLIC_BASE_URL:-https://focms.megaannum.ai:8001/c}
    volumes:
      - ${FIREBASE_CREDENTIALS_PATH:-./firebase-service-account.json}:/app/firebase-service-account.json:ro
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ebc-internal

  mongodb:
    image: mongo:7
    container_name: ebc-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ebc-internal

networks:
  ebc-internal:
    driver: bridge

volumes:
  mongodb_data:
