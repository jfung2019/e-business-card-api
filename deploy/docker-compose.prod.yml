# Production stack for a Linux VPS (Alibaba Simple Application Server).
# MongoDB binds to 127.0.0.1:27017 on the server only (use SSH tunnel from your PC).
# API uses host networking on 127.0.0.1:8002 (nginx SSL proxies here).
# Host networking avoids broken Docker bridge DNS on some Alibaba VPS instances
# (Firebase token verification needs www.googleapis.com).
# Paths are relative to repo root — use: bash deploy/start.sh (DEPLOY_ENV=prod in .env)

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: ebc-api
    restart: unless-stopped
    network_mode: host
    command: ["uvicorn", "app.main:app", "--host", "127.0.0.1", "--port", "8002"]
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@127.0.0.1:27017
      MONGO_DB_NAME: ${MONGO_DB_NAME:-e_business_card}
      MONGO_CARDS_COLLECTION: ${MONGO_CARDS_COLLECTION:-captured_cards}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-chat}
      OPENROUTER_TIMEOUT_SECONDS: ${OPENROUTER_TIMEOUT_SECONDS:-30}
      OPENROUTER_MAX_RETRIES: ${OPENROUTER_MAX_RETRIES:-2}
      FIREBASE_CREDENTIALS_PATH: /app/secrets/firebase-service-account.json
      SHARE_PUBLIC_BASE_URL: ${SHARE_PUBLIC_BASE_URL:-https://ebc.megaannum.ai/c}
    volumes:
      - ${SECRETS_BIND_MOUNT}:/app/secrets:ro
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:7
    container_name: ebc-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ebc-internal

networks:
  ebc-internal:
    driver: bridge

volumes:
  mongodb_data:
