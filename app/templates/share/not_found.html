<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Card not found — E-Business Card</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f2f2f7;
      color: #111;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      background: #fff;
      border: 1px solid #e5e5ea;
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(17, 17, 17, 0.06);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.35rem;
    }
    p {
      margin: 0;
      color: #6b6b6b;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>This card link is unavailable</h1>
    <p>The link may have expired, been revoked, or is incorrect. Ask the sender to share their card again.</p>
  </section>
</body>
</html>
